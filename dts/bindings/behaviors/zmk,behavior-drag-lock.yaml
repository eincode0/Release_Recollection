description: |
  〈Drag Lock〉— Toggle MB1 hold state with a single key.
  Internal state alternates between two child bindings:
  first tap invokes on-binding (lock), next tap invokes off-binding (release).

compatible: "zmk,behavior-drag-lock"

include: zero_param.yaml

properties:
  on-bindings:
    type: phandle-array
    required: true
    description: Behavior to invoke when locking (e.g. drag_on macro).
  off-bindings:
    type: phandle-array
    required: true
    description: Behavior to invoke when unlocking (e.g. drag_off macro).
