name: Draw keymap

on:
  push:
    branches: [main]
    paths:
      - "config/KeyballBLE.keymap"
      - "keymap_drawer.yaml"
  workflow_dispatch:

jobs:
  draw:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install keymap-drawer
        run: pip install keymap-drawer

      - name: Parse ZMK keymap
        run: keymap -c keymap_drawer.yaml parse -z config/KeyballBLE.keymap > keymap.yaml

      - name: Draw keymap
        run: keymap -c keymap_drawer.yaml draw keymap.yaml > keymap.svg

      - name: Commit generated files
        uses: EndBug/add-and-commit@v9
        with:
          add: "keymap.svg keymap.yaml"
          message: "chore: update keymap drawing [skip ci]"
          default_author: github_actions
