# BLE表示名
CONFIG_ZMK_KEYBOARD_NAME="Dark Repulser"

# NFC ピンを GPIO として使用（BLE干渉防止）
CONFIG_NFCT_PINS_AS_GPIOS=y

# 〈Reflex Boost〉— キースキャンデバウンス短縮（応答性向上）
CONFIG_ZMK_KSCAN_DEBOUNCE_PRESS_MS=3
CONFIG_ZMK_KSCAN_DEBOUNCE_RELEASE_MS=3

# Bluetooth 接続の基本設定
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_BT_MAX_CONN=5
CONFIG_BT_MAX_PAIRED=5
CONFIG_BT_CTLR_PHY_2M=y
CONFIG_BT_AUTO_PHY_UPDATE=y
CONFIG_BT_CTLR_DATA_LENGTH_MAX=251
CONFIG_BT_BUF_ACL_RX_SIZE=251
CONFIG_BT_BUF_ACL_TX_SIZE=251

# 〈Bandwidth Surge〉— BLE TX バッファ増量
CONFIG_BT_BUF_ACL_TX_COUNT=10

# 接続パラメータの同期（右側 Elucidator と完全一致させる）
CONFIG_BT_GAP_AUTO_UPDATE_CONN_PARAMS=y
CONFIG_BT_CONN_PARAM_UPDATE_TIMEOUT=1000
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=600
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=6

# スプリット接続パラメータ（Left-Right 間）
CONFIG_ZMK_SPLIT_BLE_PREF_LATENCY=0
CONFIG_ZMK_SPLIT_BLE_PREF_TIMEOUT=1000

# スリープ・Insomnia設定（右側と同期）
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000
CONFIG_ZMK_INSOMNIA_PING_INTERVAL=3000
CONFIG_ZMK_INSOMNIA_PING_ON_START=y

# 通信スタックの有効化（ポインティング・マウス）
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y

# Rotary encoder（左手専用）
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_OWN_THREAD=y
CONFIG_EC11_THREAD_PRIORITY=14
CONFIG_EC11_THREAD_STACK_SIZE=4096

# バッテリー・システム設定
CONFIG_ZMK_BATTERY_REPORTING=y

# Boot Retention（新方式）
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_RETENTION_BOOT_MODE=y

# ログサブシステム（ホスト BLE 接続維持に必須）
# USB_LOGGING=y 必須とされていた真因は LOG 処理スレッドの存在による
# スケジューラ挙動。USB CDC ACM は不要なので USB_LOGGING 自体は OFF。
CONFIG_ZMK_USB_LOGGING=n
CONFIG_LOG=y
