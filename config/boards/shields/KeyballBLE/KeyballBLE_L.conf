# Rotary encoder（左手スレーブ専用）
CONFIG_EC11=y
CONFIG_EC11_TRIGGER_OWN_THREAD=y   # ← 記事の核心
CONFIG_EC11_THREAD_PRIORITY=14
CONFIG_EC11_THREAD_STACK_SIZE=4096
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_MOUSE=y
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# BLE TX出力を上げる（左右間の接続安定化）
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y

# BLEスタックの安定性向上
CONFIG_BT_BUF_ACL_TX_COUNT=6
CONFIG_BT_BUF_ACL_TX_SIZE=251
CONFIG_BT_CONN_TX_MAX=6

# スリープ設定（R側と合わせる）
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# BLE接続パラメータ（R側と合わせる）
CONFIG_BT_PERIPHERAL_PREF_MIN_INT=6
CONFIG_BT_PERIPHERAL_PREF_MAX_INT=12
CONFIG_BT_PERIPHERAL_PREF_LATENCY=0
CONFIG_BT_PERIPHERAL_PREF_TIMEOUT=800

# スタックサイズ拡張（スタックオーバーフロー防止）
CONFIG_MAIN_STACK_SIZE=6144
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=8192

# Boot Retention（&bootloader 新方式）
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_RETENTION_BOOT_MODE=y
