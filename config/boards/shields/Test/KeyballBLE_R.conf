CONFIG_ZMK_KEYBOARD_NAME="KeyballBLE"

# Enable NFC pins as GPIOs
CONFIG_NFCT_PINS_AS_GPIOS=y

# Enable Bluetooth and pointing device support
CONFIG_ZMK_BLE=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
CONFIG_ZMK_MOUSE=y

# Enable SPI and input subsystem
CONFIG_SPI=y
CONFIG_INPUT=y

# PMW3610 trackball sensor configuration
CONFIG_PMW3610=y
CONFIG_PMW3610_CPI=800
CONFIG_PMW3610_CPI_DIVIDOR=1
CONFIG_PMW3610_ORIENTATION_180=y
# CONFIG_PMW3610_SNIPE_CPI=800
# CONFIG_PMW3610_SNIPE_CPI_DIVIDOR=4
CONFIG_PMW3610_SCROLL_TICK=64
CONFIG_PMW3610_INVERT_X=n
CONFIG_PMW3610_INVERT_SCROLL_X=y
CONFIG_PMW3610_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_REST1_SAMPLE_TIME_MS=20
#CONFIG_PMW3610_REST1_DOWNSHIFT_TIME_MS=9600
#CONFIG_PMW3610_REST2_SAMPLE_TIME_MS=
#CONFIG_PMW3610_REST2_DOWNSHIFT_TIME_MS=
#CONFIG_PMW3610_REST3_SAMPLE_TIME_MS=
#CONFIG_PMW3610_REST3_DOWNSHIFT_TIME_MS=
#CONFIG_PMW3610_FORCE_AWAKE=n
CONFIG_PMW3610_POLLING_RATE_125_SW=y

# Threshold for movement detection (0 means no minimum threshold)
CONFIG_PMW3610_MOVEMENT_THRESHOLD=0

# Enable smart algorithm for PMW3610
CONFIG_PMW3610_SMART_ALGORITHM=y

# Rotary encoder configuration
CONFIG_EC11=n
CONFIG_EC11_TRIGGER_GLOBAL_THREAD=y

# Battery reporting configuration
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# ZMK Studio configuration
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n

# LED configuration: layer-based colors
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y

# 基本レイヤーの色
# default_layer: OFF
CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=0
# FUNCTION: red
CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=1
# ARROW_SIGN: green
CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=2
# NUM: yellow
CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=3
# MOUSE: blue
CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=4
# SCROLL: magenta
CONFIG_RGBLED_WIDGET_LAYER_5_COLOR=5
# Bluetooth: cyan
CONFIG_RGBLED_WIDGET_LAYER_6_COLOR=6

# ジェスチャーレイヤーの色（重複しないように調整）
# GESTURE_E: yellow
CONFIG_RGBLED_WIDGET_LAYER_7_COLOR=3
# GESTURE_R: blue
CONFIG_RGBLED_WIDGET_LAYER_8_COLOR=4
# GESTURE_S: magenta
CONFIG_RGBLED_WIDGET_LAYER_9_COLOR=5
# GESTURE_M: off
CONFIG_RGBLED_WIDGET_LAYER_10_COLOR=0
# GESTURE_T: cyan
CONFIG_RGBLED_WIDGET_LAYER_11_COLOR=6
# GESTURE_A: white
CONFIG_RGBLED_WIDGET_LAYER_12_COLOR=7
# GESTURE_D: red
CONFIG_RGBLED_WIDGET_LAYER_13_COLOR=1
# GESTURE_W: green
CONFIG_RGBLED_WIDGET_LAYER_14_COLOR=2
# SCROLL_SNAP:white
CONFIG_RGBLED_WIDGET_LAYER_15_COLOR=7
# SNIPE: magenta
CONFIG_RGBLED_WIDGET_LAYER_16_COLOR=5
