CONFIG_ZMK_KEYBOARD_NAME="KeyballBLE"

# Bluetooth and pointing device support
CONFIG_ZMK_BLE=y
CONFIG_BT_CTLR_TX_PWR_PLUS_8=y
CONFIG_ZMK_POINTING=y
CONFIG_ZMK_POINTING_SMOOTH_SCROLLING=y
CONFIG_ZMK_MOUSE=y

# SPI and input subsystem
CONFIG_SPI=y
CONFIG_INPUT=y

# PMW3610 trackball sensor (eincode0 alt driver)
CONFIG_PMW3610_ALT=y
CONFIG_PMW3610_ALT_RUN_DOWNSHIFT_TIME_MS=3264
CONFIG_PMW3610_ALT_REST1_SAMPLE_TIME_MS=20
CONFIG_PMW3610_ALT_MOVEMENT_THRESHOLD=0
CONFIG_PMW3610_ALT_SMART_ALGORITHM=y

# 軸反転
CONFIG_PMW3610_ALT_INVERT_Y=y

CONFIG_PMW3610_ALT_INVERT_SCROLL_Y=y

# スナイプ設定（snipe-layers = <15> はoverlay側で指定）
CONFIG_PMW3610_ALT_SNIPE_CPI_DIVIDOR=4

# ポインタ加速
CONFIG_ZMK_INPUT_PROCESSOR_ACCELERATION=y
CONFIG_INPUT_PROCESSOR_ACCEL_LEVEL_SIMPLE=y
CONFIG_INPUT_PROCESSOR_ACCEL_PRESET_HIGH_SENS_TRACKBALL=y

# スリープ設定
CONFIG_ZMK_IDLE_TIMEOUT=30000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=3600000

# Insomnia（BLE接続中はスリープしない）
CONFIG_ZMK_INSOMNIA_PING_INTERVAL=30000
CONFIG_ZMK_INSOMNIA_PING_ON_START=y

# Battery reporting
CONFIG_ZMK_BATTERY_REPORTING=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_PROXY=y
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# ZMK Studio
CONFIG_ZMK_USB=y
CONFIG_ZMK_STUDIO=y
CONFIG_ZMK_STUDIO_LOCKING=n
CONFIG_ZMK_BEHAVIORS_KEEP_ALL=y

# LED: layer-based colors
CONFIG_RGBLED_WIDGET=y
CONFIG_RGBLED_WIDGET_SHOW_LAYER_COLORS=y

CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_HIGH=50
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_LOW=20
CONFIG_RGBLED_WIDGET_BATTERY_LEVEL_CRITICAL=10
CONFIG_RGBLED_WIDGET_INTERVAL_MS=250
CONFIG_RGBLED_WIDGET_BATTERY_SHOW_PERIPHERALS=y

# 基本レイヤー (0-6)
CONFIG_RGBLED_WIDGET_LAYER_0_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_1_COLOR=1
CONFIG_RGBLED_WIDGET_LAYER_2_COLOR=2
CONFIG_RGBLED_WIDGET_LAYER_3_COLOR=3
CONFIG_RGBLED_WIDGET_LAYER_4_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_5_COLOR=5
CONFIG_RGBLED_WIDGET_LAYER_6_COLOR=6

# ジェスチャーレイヤー (7-14)
CONFIG_RGBLED_WIDGET_LAYER_7_COLOR=3
CONFIG_RGBLED_WIDGET_LAYER_8_COLOR=4
CONFIG_RGBLED_WIDGET_LAYER_9_COLOR=5
CONFIG_RGBLED_WIDGET_LAYER_10_COLOR=0
CONFIG_RGBLED_WIDGET_LAYER_11_COLOR=6
CONFIG_RGBLED_WIDGET_LAYER_12_COLOR=7
CONFIG_RGBLED_WIDGET_LAYER_13_COLOR=1
CONFIG_RGBLED_WIDGET_LAYER_14_COLOR=2

# SNIPEレイヤー (15)
CONFIG_RGBLED_WIDGET_LAYER_15_COLOR=7

# Boot Retention（&bootloader 新方式）
CONFIG_RETAINED_MEM=y
CONFIG_RETENTION=y
CONFIG_RETENTION_BOOT_MODE=y
