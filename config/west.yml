manifest:
  remotes:
    - name: zmkfirmware
      url-base: https://github.com/zmkfirmware
    - name: eincode0
      url-base: https://github.com/eincode0
    - name: ssbb
      url-base: https://github.com/ssbb
    - name: kot149
      url-base: https://github.com/kot149
    - name: caksoylar
      url-base: https://github.com/caksoylar
    - name: nuovotaka
      url-base: https://github.com/nuovotaka
    - name: badjeff
      url-base: https://github.com/badjeff

  projects:
    - name: zmk
      remote: zmkfirmware
      revision: main
      path: zmk
      import: app/west.yml

    - name: zmk-pmw3610-driver
      remote: eincode0
      revision: main
      path: modules/zmk-pmw3610-driver

    - name: zmk-listeners
      remote: ssbb
      revision: v1
      path: modules/zmk-listeners

    - name: zmk-mouse-gesture
      remote: kot149
      revision: v1
      path: modules/zmk-mouse-gesture

    - name: zmk-rgbled-widget
      remote: caksoylar
      revision: main
      path: modules/zmk-rgbled-widget
    - name: zmk-pointing-acceleration-alpha
      remote: nuovotaka
      revision: main
      path: modules/zmk-pointing-acceleration-alpha
    - name: zmk-behavior-insomnia
      remote: badjeff
      revision: main
      path: modules/zmk-behavior-insomnia

  self:
    path: config
